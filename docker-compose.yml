services:

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db-data:/var/lib/postgresql/data
    # PostgreSQL is intentionally not exposed to the host

  odoo:
    image: odoo:17.0
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - HOST=db
      - PORT=5432
      - USER=${POSTGRES_USER}
      - PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "8069:8069"   # HTTP
      - "8072:8072"   # Longpolling (used when workers > 0)
    volumes:
      - odoo-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
      - ./scripts:/opt/basetaa-scripts:ro
    # On every start: update all tenant DBs if Odoo version changed, then start normally.
    # Prevents KeyError: 'ir.http' after any Odoo image upgrade.
    command: bash -c "bash /opt/basetaa-scripts/update_tenants.sh && exec odoo"

volumes:
  db-data:
  odoo-data:
