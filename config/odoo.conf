[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; DB host/user/password are injected by Docker via HOST/USER/PASSWORD env vars.
; Set db_name to lock Odoo to a single database (recommended for single-tenant).
db_name = odoo

; Master password for the database manager (change before first run).
admin_passwd = CHANGE_ME_BEFORE_FIRST_RUN

; workers = 0 → single-process mode, simplest for small deployments.
; Increase to 2+ (must be even) for production load, then port 8072 becomes active.
workers = 0

log_level = info
